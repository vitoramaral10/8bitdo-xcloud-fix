# Configuração do 8bitdo-xcloud-fix.
# Depois de editar, aplique com:  sudo systemctl restart 8bitdo-xcloud
#
# ---------------------------------------------------------------------------
# DEVICE_ID: VID:PID USB do controle.
#   2dc8:310b  Ultimate 2 Wireless — modo XInput  (padrão, recomendado p/ xCloud)
#   2dc8:6012  Ultimate 2 Wireless — modo DInput
#   2dc8:3106  Ultimate 2 Wireless — undocked
# Descubra o do seu com:  lsusb | grep -i 2dc8
DEVICE_ID="2dc8:310b"

# Mapeamento dos eixos analógicos (sticks, gatilhos, d-pad) para o Xbox 360.
ABSMAP="ABS_X=x1,ABS_Y=y1,ABS_RX=x2,ABS_RY=y2,ABS_Z=lt,ABS_RZ=rt,ABS_HAT0X=dpad_x,ABS_HAT0Y=dpad_y"

# Mapeamento dos botões físicos para o Xbox 360.
KEYMAP="BTN_SOUTH=a,BTN_EAST=b,BTN_NORTH=y,BTN_WEST=x,BTN_TL=lb,BTN_TR=rb,BTN_THUMBL=tl,BTN_THUMBR=tr,BTN_SELECT=back,BTN_START=start,BTN_MODE=guide"

# Argumentos extras opcionais passados ao xboxdrv (ex.: "--deadzone 4000").
EXTRA_ARGS=""
